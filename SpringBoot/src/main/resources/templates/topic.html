<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:inline="javascript">
<head>
<meta charset="UTF-8">
<title>Topic page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="/css/exam.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>
<body>
<nav class="custom-header border-bottom bg-white py-2">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
      <a href="/" class="d-flex align-items-center gap-2 ">
        <img src="/images/로고.png" height="40" style="height: 48px; width: auto;" alt="로고">
        <span class="fw-bold text-dark"></span>
      </a>
    </div>
    <div class="d-flex gap-2">
      <a href="/mypage" class="btn btn-outline-secondary btn-sm">MYPAGE</a>
      <a href="/logout" class="btn btn-outline-danger btn-sm">LOGOUT</a>
    </div>
  </div>
</nav>
<div class="panel panel-warning">
  <div class="exam-title-bar">
	  <input type="hidden" id="category" th:value="${category}" />
	  <h3 id="examTopic" style="text-align:center; color:white;"></h3>
	</div>
  <div class="panel-body">
    <input type="hidden" id="category" th:value="${category}" />
    <div class="container px-4" id="examBoard" style="display:flex; flex-wrap:wrap;"></div>
    <div id="pagination" class="text-center mt-4"></div>
  </div>

</div>
<footer class="footer mt-5 py-4 border-top">
  <div class="container text-center">
    <nav class="nav justify-content-center mb-3">
      <a href="#" class="footer-link">Home</a>
      <a href="#" class="footer-link">About</a>
      <a href="#" class="footer-link">Contact</a>
    </nav>
    <p class="text-muted small mb-0">\u00a9 2025 \ubb38\uc81c Issue!</p>
  </div>
</footer>
<script th:inline="javascript">
const chapterTitles = [
  /*[[${liChap1}]]*/,
  /*[[${liChap2}]]*/,
  /*[[${liChap3}]]*/,
  /*[[${liChap4}]]*/,
  /*[[${liChap5}]]*/
];
</script>
<script type="text/javascript">
let exData = [];
let shufData = [];
let currentPage = 0;
const userSelections = {};
$(document).ready(function(){
  loadExam();
  topic();
});
function loadExam() {
  const category = $("#category").val();
  $.when(
    $.ajax({ url: "/loadExam/" + category, type: "post", dataType: "json" }),
    $.ajax({ url: "/shuffle/" + category, type: "post", dataType: "json" })
  ).done(function(examData, shuffleData) {
    exData = examData[0];
    shufData = shuffleData[0];
    renderPage(0);
  }).fail(function() {
    alert("Error!");
  });
}
function renderPage(pageIndex) {
  currentPage = pageIndex;
  const startIdx = pageIndex * 20;
  const endIdx = startIdx + 20;
  const category = $("#category").val();
  const chapterTitle = chapterTitles[pageIndex] != null ? chapterTitles[pageIndex] : "";  // null or undefined 처리
  let listHtml = "<div class='exam-section'><h4 class='subjectIdx'>" + chapterTitle + "</h4><hr><div class='column-wrapper'>";
  for (let idx = startIdx; idx < endIdx && idx < exData.length; idx++) {
    const pb = exData[idx];
    const options = shufData[idx];
    const pbId = pb.pbId - 1;
    listHtml += "<div class='oneExam'>";
    listHtml += "<div id='examYear" + (idx + 1) + "'></div>";
    listHtml += "<div class='question'><img id='check" + (idx + 1) + "' style='position:absolute; top: -25px; left: -30px; width: 100px; height: 100px; display: none;' alt=''>" +
                (idx + 1) + ". " + pb.pbQues + "</div>";
    if (pb.pbDetail) listHtml += "<br><div><img src='" + pb.pbDetail + "'></div><br>";
    for (let k = 0; k < 4; k++) {
      const choice = options[k];
      listHtml += "<div class='choice' id='choice" + (idx + 1) + "-" + (k + 1) + "' onclick='selectChoice(" + (idx + 1) + "," + (k + 1) + ", \"" + choice + "\")'>";
      listHtml += "<div id='choiceNum" + (idx + 1) + "-" + (k + 1) + "'> " + ["\u2460","\u2461","\u2462","\u2463"][k] + " &nbsp; </div>";
      listHtml += choice.includes("http") ?
        "<div id='choiceText" + (idx + 1) + "-" + (k + 1) + "'><img src='" + choice + "'></div>" :
        "<div id='choiceText" + (idx + 1) + "-" + (k + 1) + "'>" + choice + "</div>";
      listHtml += "</div>";
    }
    listHtml += "<br><button class='btn btn-outline-info' id='pbans" + idx + "' onclick='correctAnswer(" + pbId + ", " + idx + ")'>\uc815\ub2f5 \ud655\uc778</button> ";
    listHtml += "<button class='btn btn-outline-warning' onclick='solution(" + pbId + ", " + idx + ")'>\ud574\uc124</button>";
    listHtml += "<div class='solution' id='solution" + idx + "'></div></div>";
  }
  listHtml += "</div></div>";
  $("#examBoard").html(listHtml);
  renderPagination();
}
function renderPagination() {
  let html = '<ul class="pagination justify-content-center">';
  html += `<li class="page-item ${currentPage === 0 ? 'disabled' : ''}"><button class="page-link" onclick="renderPage(0)">≪</button></li>`;
  const totalPage = Math.ceil(exData.length / 20);
  for (let i = 0; i < totalPage; i++) {
    html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><button class="page-link" onclick="renderPage(${i})">${i + 1}</button></li>`;
  }
  html += `<li class="page-item ${currentPage >= totalPage - 1 ? 'disabled' : ''}"><button class="page-link" onclick="renderPage(${totalPage - 1})">≫</button></li>`;
  html += '</ul>';
  $("#pagination").html(html);
}
function selectChoice(questionNum, choiceNum, choiceText) {
  const currentSelection = userSelections[questionNum];
  if (currentSelection === choiceText) {
    delete userSelections[questionNum];
  } else {
    userSelections[questionNum] = choiceText;
  }
  for (let i = 1; i <= 4; i++) {
    $("#choiceNum" + questionNum + "-" + i).css("font-weight", "normal");
    $("#choiceText" + questionNum + "-" + i).css("font-weight", "normal");
  }
  if (userSelections[questionNum]) {
    $("#choiceNum" + questionNum + "-" + choiceNum).css("font-weight", "bold");
    $("#choiceText" + questionNum + "-" + choiceNum).css("font-weight", "bold");
  }
}
function correctAnswer(pbId, index) {
  $.ajax({ url: "/correctAnswer/" + pbId, type: "put", dataType: "text",
    success: function(data) {
      if ($("#pbans" + index).text().trim() === "\uc815\ub2f5 \ud655\uc778") {
        document.getElementById("examYear" + (index + 1)).scrollIntoView({ behavior: 'smooth', block: 'start' });
        for (let i = 1; i <= 4; i++) {
          let choiceText = $("#choiceText" + (index + 1) + "-" + i).text().trim();
          if (choiceText === data.trim()) {
            $("#choice" + (index + 1) + "-" + i).css("color", "red");
          }
        }
        if (userSelections[index + 1] === data) {
          $("#check" + (index + 1)).show().attr("src", "/images/o.png");
        } else {
          $("#check" + (index + 1)).show().attr("src", "/images/x.png");
        }
      }
    },
    error: function() { alert("Error!"); }
  });
}
function solution(pbId, index) {
  $.ajax({ url: "/solution/" + pbId, type: "put", dataType: "text",
    success: function(data) {
      const solDiv = $("#solution" + index);
      if (solDiv.text().trim() === "") solDiv.text(data);
      else solDiv.text("");
    },
    error: function() { alert("Error!"); }
  });
}
function topic() {
  const category = $("#category").val();
  $.ajax({ url: "/loadTopic/" + category, type: "post", dataType: "json",
    success: function(data) {
      const topic = data[0];
      $("#examTopic").text(topic.topicName);
    },
    error: function() { alert("Error!"); }
  });
}
</script>
</body>
</html>
